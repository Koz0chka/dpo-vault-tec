<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vault-Tec Terminal — Vault</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body class="app-body">
  <header class="app-header">
    <div class="app-header__left">
      <svg viewBox="0 0 48 48" width="28" height="28" aria-hidden="true">
        <circle cx="24" cy="24" r="22" fill="none" stroke="#00ff41" stroke-width="2"/>
        <circle cx="24" cy="24" r="16" fill="none" stroke="#00ff41" stroke-width="1" stroke-dasharray="2 2"/>
        <rect x="15" y="22" width="18" height="14" rx="1" fill="#00ff41"/>
        <path d="M18 22 V16 a6 6 0 0 1 12 0 V22" fill="none" stroke="#00ff41" stroke-width="2.5"/>
        <circle cx="24" cy="28" r="2" fill="#0a0e0a"/>
        <rect x="23" y="28" width="2" height="5" fill="#0a0e0a"/>
      </svg>
      <span class="app-title">VAULT-TEC</span>
    </div>
    <div class="app-header__right">
      <span id="userBadge" class="user-badge"></span>
      <button id="logoutBtn" class="ghost-btn" title="Выйти">&gt; LOGOUT</button>
    </div>
  </header>

  <main class="app-main">
    <section class="panel" data-corner="01">
      <div class="panel__head">
        <h2>Password Generator</h2>
        <span id="genStrength" class="badge badge--medium">—</span>
      </div>

      <div class="gen-grid">
        <div class="gen-output-row">
          <input id="generatedPassword" type="text" readonly placeholder="// press GENERATE" />
          <button type="button" id="copyGenBtn" class="ghost-btn" title="Скопировать">
            <svg viewBox="0 0 24 24" width="16" height="16"><rect x="9" y="9" width="11" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button type="button" id="generateBtn" class="primary-btn">&gt; GENERATE</button>
        </div>

        <div class="gen-controls">
          <label class="field">
            <span class="field-label">LENGTH: <strong id="lenLabel">16</strong> CHARS</span>
            <input id="lengthRange" type="range" min="6" max="64" value="16" />
          </label>

          <div class="checkbox-grid">
            <label class="checkbox"><input type="checkbox" id="opt_lower" checked /> a–z lowercase</label>
            <label class="checkbox"><input type="checkbox" id="opt_upper" checked /> A–Z uppercase</label>
            <label class="checkbox"><input type="checkbox" id="opt_digits" checked /> 0–9 digits</label>
            <label class="checkbox"><input type="checkbox" id="opt_symbols" checked /> !@#$ symbols</label>
            <label class="checkbox"><input type="checkbox" id="opt_amb" /> exclude ambiguous (0/O, 1/l)</label>
          </div>

          <button type="button" id="saveGenBtn" class="secondary-btn">&gt; SAVE TO VAULT</button>
        </div>
      </div>
    </section>

    <section class="panel" data-corner="02">
      <div class="panel__head">
        <h2>Stored Credentials <span id="countBadge" class="count-badge">0</span></h2>
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="M16 16 L21 21" stroke="currentColor" stroke-width="2"/></svg>
          <input id="searchInput" type="search" placeholder="search credentials..." />
        </div>
      </div>

      <div id="passwordList" class="password-list">
        <div class="empty-state">LOADING TERMINAL...</div>
      </div>
    </section>
  </main>

  <!-- Модальное окно: сохранение нового пароля -->
  <div id="createModal" class="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="createTitle">
      <h3 id="createTitle" class="modal__title">New Credential Entry</h3>
      <form id="createForm" class="modal__form">
        <label class="field">
          <span class="field-label">&gt; ENTRY NAME</span>
          <input type="text" name="name" required maxlength="128" placeholder="RobCo Terminal" />
        </label>
        <label class="field">
          <span class="field-label">&gt; PASSWORD</span>
          <div class="input-with-action">
            <input type="text" name="value" id="createValue" required maxlength="4096" />
            <button type="button" class="ghost-btn generate-inline" title="Сгенерировать">
              <svg viewBox="0 0 24 24" width="16" height="16"><path d="M21 3 L13 11 M21 3 L15 21 L11 14 L4 10 Z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
        </label>
        <div id="createError" class="error-box" role="alert" hidden></div>
        <div class="modal__actions">
          <button type="button" class="ghost-btn" data-close>&gt; CANCEL</button>
          <button type="submit" class="primary-btn">&gt; SAVE</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Модальное окно: переименование -->
  <div id="renameModal" class="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="renameTitle">
      <h3 id="renameTitle" class="modal__title">Rename Entry</h3>
      <form id="renameForm" class="modal__form">
        <input type="hidden" name="id" />
        <label class="field">
          <span class="field-label">&gt; NEW NAME</span>
          <input type="text" name="new_name" required maxlength="128" />
        </label>
        <div id="renameError" class="error-box" role="alert" hidden></div>
        <div class="modal__actions">
          <button type="button" class="ghost-btn" data-close>&gt; CANCEL</button>
          <button type="submit" class="primary-btn">&gt; SAVE</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Тосты -->
  <div id="toast" class="toast" hidden></div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
